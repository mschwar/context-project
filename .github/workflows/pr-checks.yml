name: PR Checks

on:
  pull_request:
    branches: [ "main", "master" ]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Add or modify these commands based on your project's build/test scripts
      - name: Run Build
        run: npm run build --if-present

      - name: Run Tests
        run: npm run test --if-present
