name: CTX Manifest Check

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
  pull_request:
    branches:
      - main
      - feat/**
      - fix/**

jobs:
  check_ctx_manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ctx
        run: python -m pip install -e ".[dev]"

      - name: Check CTX manifests are fresh
        run: python -m ctx check . --check-exit
        env:
          CTX_OUTPUT: json
